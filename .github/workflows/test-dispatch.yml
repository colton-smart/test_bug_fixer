name: AI Pipeline Debug (Phase 4)

on:
  repository_dispatch:
    types:
      - jira-bug-created
      - jira-bug-updated

jobs:
  build-branch:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Extract variables
        run: |
          echo "JIRA_KEY=${{ github.event.client_payload.jira_key }}" >> $GITHUB_ENV
          echo "SUMMARY=${{ github.event.client_payload.summary }}" >> $GITHUB_ENV
          echo "BRANCH=ai-fix/${{ github.event.client_payload.jira_key }}" >> $GITHUB_ENV
          echo "EVENT_ID=${{ github.event.client_payload.timestamp }}" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure labels exist
        run: |
          gh label create "ai-pipeline:created" --color "0e8a16" --force || true
          gh label create "ai-pipeline:updated" --color "1d76db" --force || true
          gh label create "ai-fix" --color "5319e7" --force || true

      - name: Create or reuse branch
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            git checkout -b "$BRANCH" origin/"$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Simulate change
        run: |
          echo "Fix placeholder for ${JIRA_KEY}" > ai-fix.txt

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@test.local"

          git add .
          git commit -m "fix(${JIRA_KEY}): ${SUMMARY}" || echo "No changes"

      - name: Push branch
        run: |
          git push origin "$BRANCH"

      - name: Detect existing PR
        run: |
          PR_JSON=$(gh pr list --search "$BRANCH in:head" --json number,url)
          PR_COUNT=$(echo "$PR_JSON" | jq length)

          if [ "$PR_COUNT" -gt 0 ]; then
            echo "PR_EXISTS=true" >> $GITHUB_ENV
            echo "PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')" >> $GITHUB_ENV
            echo "PR_URL=$(echo "$PR_JSON" | jq -r '.[0].url')" >> $GITHUB_ENV
          else
            echo "PR_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Prevent duplicate processing
        if: env.PR_EXISTS == 'true'
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q .body)

          if echo "$PR_BODY" | grep -q "$EVENT_ID"; then
            echo "Already processed event"
            exit 0
          fi

      - name: Create or update PR
        run: |
          if [ "$PR_EXISTS" = "true" ]; then
            gh pr edit "$PR_NUMBER" \
              --add-label "ai-pipeline:updated"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "[AI Fix] $JIRA_KEY - $SUMMARY" \
              --body "Initial AI pipeline PR for $JIRA_KEY\n\nProcessed event: $EVENT_ID" \
              --label "ai-fix,ai-pipeline:created"
          fi

      - name: Append PR audit note
        run: |
          if [ "$PR_EXISTS" = "true" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "🔄 Jira update received for ${JIRA_KEY} at $(date -u)\nProcessed event: ${EVENT_ID}"
          fi
