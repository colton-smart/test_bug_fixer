name: AI Pipeline Debug (Phase 4)

on:
  repository_dispatch:
    types:
      - jira-bug-created
      - jira-bug-updated

permissions:
  contents: write
  pull-requests: write

jobs:
  build-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:

      # ── 1. EXTRACT VARIABLES ────────────────────────────────────────────
      - name: Extract variables
        run: |
          echo "JIRA_KEY=${{ github.event.client_payload.jira_key }}" >> $GITHUB_ENV
          echo "BRANCH=ai-fix/${{ github.event.client_payload.jira_key }}" >> $GITHUB_ENV
          echo "EVENT_ID=${{ github.event.client_payload.timestamp }}" >> $GITHUB_ENV

          echo 'SUMMARY<<EOF' >> $GITHUB_ENV
          echo "${{ github.event.client_payload.summary }}" >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

      # ── 2. CHECKOUT ─────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 3. ENSURE LABELS EXIST ──────────────────────────────────────────
      - name: Ensure labels exist
        run: |
          gh label create "ai-pipeline:created" --color "0e8a16" --force || true
          gh label create "ai-pipeline:updated" --color "1d76db" --force || true
          gh label create "ai-fix"              --color "5319e7" --force || true

      # ── 4. CREATE OR REUSE BRANCH ───────────────────────────────────────
      - name: Create or reuse branch
        run: |
          git fetch origin
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "Branch exists remotely — checking out"
            git checkout -b "$BRANCH" origin/"$BRANCH"
          else
            echo "Branch does not exist — creating"
            git checkout -b "$BRANCH"
          fi

      # ── 5. GENERATE ARTIFACT ────────────────────────────────────────────
      - name: Generate AI prompt artifact
        run: |
          mkdir -p ai-artifacts

          cat > ai-artifacts/ai-prompt.md << EOF
          # AI Bug Fix Prompt

          ## Jira Key
          ${JIRA_KEY}

          ## Summary
          ${SUMMARY}

          ## Description
          ${{ github.event.client_payload.description }}

          ---

          ## Instructions to AI

          You are a senior software engineer working in a legacy PHP Zend Framework 1 MVC application.

          Your task:
          - Identify the root cause of the issue
          - Propose the minimal fix
          - Do not refactor unrelated code
          - Do not modify tests

          Output:
          - A clear explanation of the issue
          - A suggested fix (code or pseudocode)
          - Any risks or assumptions

          ---

          ## Metadata

          - Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - Event ID: ${EVENT_ID}
          EOF

      # ── 6. COMMIT CHANGES ───────────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ai-artifacts/ai-prompt.md

          git commit -m "AI artifact for ${JIRA_KEY} (${EVENT_ID})" || echo "No changes to commit"

      # ── 7. PUSH ─────────────────────────────────────────────────────────
      - name: Push branch
        run: |
          git push origin "$BRANCH"

      # ── 8. DETECT EXISTING PR ───────────────────────────────────────────
      - name: Detect existing PR
        run: |
          PR_JSON=$(gh pr list --head "$BRANCH" --json number,url)
          PR_COUNT=$(echo "$PR_JSON" | jq length)

          if [ "$PR_COUNT" -gt 0 ]; then
            echo "PR_EXISTS=true"                                       >> $GITHUB_ENV
            echo "PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')"   >> $GITHUB_ENV
            echo "PR_URL=$(echo "$PR_JSON"    | jq -r '.[0].url')"      >> $GITHUB_ENV
          else
            echo "PR_EXISTS=false" >> $GITHUB_ENV
            echo "PR_NUMBER="      >> $GITHUB_ENV
            echo "PR_URL="         >> $GITHUB_ENV
          fi

      # ── 9. DETECT DUPLICATE EVENT ───────────────────────────────────────
      - name: Detect duplicate event
        run: |
          if [ "$PR_EXISTS" = "true" ]; then
            PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q .body)
            if echo "$PR_BODY" | grep -q "$EVENT_ID"; then
              echo "Duplicate event detected — skipping remaining steps"
              echo "DUPLICATE_EVENT=true" >> $GITHUB_ENV
            else
              echo "DUPLICATE_EVENT=false" >> $GITHUB_ENV
            fi
          else
            echo "DUPLICATE_EVENT=false" >> $GITHUB_ENV
          fi

      # ── 10. CREATE OR UPDATE PR ─────────────────────────────────────────
      - name: Create or update PR
        if: env.DUPLICATE_EVENT != 'true'
        run: |
          if [ "$PR_EXISTS" = "true" ]; then
            gh pr edit "$PR_NUMBER" \
              --add-label "ai-pipeline:updated"
          else
            cat > /tmp/pr-body.md << EOF
          Initial AI pipeline PR for ${JIRA_KEY}

          Processed event: ${EVENT_ID}

          ---
          ⚠️ This PR was generated by the AI bug fix pipeline. A human should review before merging.
          EOF

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "[AI Fix] ${JIRA_KEY} - ${SUMMARY}" \
              --body-file /tmp/pr-body.md \
              --label "ai-fix,ai-pipeline:created"
          fi

      # ── 11. APPEND AUDIT COMMENT ON UPDATES ─────────────────────────────
      - name: Append PR audit note
        if: env.DUPLICATE_EVENT != 'true' && env.PR_EXISTS == 'true'
        run: |
          cat > /tmp/comment-body.md << EOF
          🔄 Jira update received for **${JIRA_KEY}** at $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          Processed event: ${EVENT_ID}
          EOF

          gh pr comment "$PR_NUMBER" --body-file /tmp/comment-body.md

      # ── 12. SUMMARY ─────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "======================================="
          echo "        AI Pipeline Summary"
          echo "======================================="
          echo "Jira Key   : ${JIRA_KEY}"
          echo "Branch     : ${BRANCH}"
          echo "PR Exists  : ${PR_EXISTS:-unknown}"
          echo "PR Number  : ${PR_NUMBER:-n/a}"
          echo "PR URL     : ${PR_URL:-n/a}"
          echo "Duplicate  : ${DUPLICATE_EVENT:-false}"
          echo "Event ID   : ${EVENT_ID}"
          echo "======================================="
