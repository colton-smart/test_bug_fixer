name: AI Pipeline Debug (Phase 3)

on:
  repository_dispatch:
    types:
      - jira-bug-created
      - jira-bug-updated

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Dump event action
        run: |
          echo "EVENT ACTION: ${{ github.event.action }}"

      - name: Dump payload
        run: |
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Extract values
        run: |
          echo "JIRA_KEY: ${{ github.event.client_payload.jira_key }}"
          echo "SUMMARY: ${{ github.event.client_payload.summary }}"

      - name: Pipeline status
        run: |
          echo "PIPELINE STATUS: DISPATCH RECEIVED - READY FOR PROCESSING"
