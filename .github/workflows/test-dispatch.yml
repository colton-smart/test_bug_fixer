name: AI Pipeline Debug (Phase 4)

on:
  repository_dispatch:
    types:
      - jira-bug-created
      - jira-bug-updated

jobs:
  build-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract variables
        run: |
          echo "JIRA_KEY=${{ github.event.client_payload.jira_key }}" >> $GITHUB_ENV
          echo "SUMMARY=${{ github.event.client_payload.summary }}" >> $GITHUB_ENV

      - name: Create branch
        run: |
          BRANCH="ai-fix/${JIRA_KEY}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"

      - name: Simulate change
        run: |
          echo "Fix placeholder for ${JIRA_KEY}" > ai-fix.txt

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@test.local"

          git add .
          git commit -m "fix(${JIRA_KEY}): ${SUMMARY}" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push origin "$BRANCH"
