name: AI Pipeline Debug (Phase 3)

on:
  repository_dispatch:
    types: [jira-bug-created, jira-bug-updated]

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Show event type
        run: echo "EVENT=${{ github.event.action }}"

      - name: Show full payload
        run: echo '${{ toJson(github.event.client_payload) }}'

      - name: Simulate routing decision
        run: |
          JIRA_KEY="${{ github.event.client_payload.jira_key }}"
          SUMMARY="${{ github.event.client_payload.summary }}"

          echo "Processing issue: $JIRA_KEY"
          echo "Summary: $SUMMARY"

      - name: Confirm pipeline stage
        run: echo "Pipeline stage: DISPATCH RECEIVED → READY FOR PROCESSING"
